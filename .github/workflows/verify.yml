name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      TEMP: ${{ runner.temp }}
      TMP: ${{ runner.temp }}
      XUANXUE_RUNS_ROOT: ${{ runner.temp }}\xuanxue_console_runs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r scripts\requirements.txt

      - name: Run verification
        run: .\verify.cmd
